name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  js-syntax:
    name: Inline JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Extract and check inline JavaScript
        run: python3 scripts/check-js.py
      - name: Lesson SEO pages in sync with course
        run: |
          python3 scripts/gen-seo-pages.py
          git diff --exit-code lessons/ sitemap.xml
