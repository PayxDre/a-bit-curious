<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0b18"/>
      <stop offset="50%" style="stop-color:#0f0f26"/>
      <stop offset="100%" style="stop-color:#0b0b18"/>
    </linearGradient>
    <linearGradient id="orange-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="big-glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#f59e0b" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(60,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(120,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(180,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(300,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(360,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(420,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(480,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(540,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(600,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(660,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(720,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(780,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(840,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(900,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(960,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1020,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1080,0)" />
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1140,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,60)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,120)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,180)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,240)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,300)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,360)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,420)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,480)" />
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,540)" />
  </g>

  <!-- Large glowing Bitcoin symbol -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#f59e0b" filter="url(#big-glow)" opacity="0.9">&#x20BF;</text>

  <!-- Accent line -->
  <rect x="500" y="310" width="200" height="2" rx="1" fill="#f59e0b" opacity="0.6" filter="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="2">
    A <tspan fill="#f59e0b">&#x20BF;</tspan>it Curious
  </text>

  <!-- Subtitle -->
  <text x="600" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#9ca3af" letter-spacing="4">
    THE INTERACTIVE GUIDE TO BITCOIN
  </text>

  <!-- Bottom accent stats -->
  <g transform="translate(600, 520)" text-anchor="middle">
    <text x="-300" font-family="monospace" font-size="14" fill="#f59e0b" font-weight="bold">21M SUPPLY</text>
    <text x="-300" y="20" font-family="monospace" font-size="11" fill="#6b7280">forever fixed</text>

    <rect x="-145" y="-8" width="1" height="30" fill="#f59e0b" opacity="0.3"/>

    <text x="0" font-family="monospace" font-size="14" fill="#f59e0b" font-weight="bold">17+ YEARS</text>
    <text x="0" y="20" font-family="monospace" font-size="11" fill="#6b7280">100% uptime</text>

    <rect x="155" y="-8" width="1" height="30" fill="#f59e0b" opacity="0.3"/>

    <text x="300" font-family="monospace" font-size="14" fill="#f59e0b" font-weight="bold">5 CHAPTERS</text>
    <text x="300" y="20" font-family="monospace" font-size="11" fill="#6b7280">30 interactive lessons</text>
  </g>

  <!-- Border glow -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
</svg>
